<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhotoFlow &mdash; Sua Rede Social</title>
  <style>
    /* ===================== RESET & VARIÁVEIS ===================== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:   #ec4899; /* Rosa para o tema PhotoFlow */
      --primary-h: #db2777;
      --accent:    #8b5cf6;
      --bg:        #f8fafc;
      --card:      #ffffff;
      --text:      #0f172a;
      --muted:     #64748b;
      --border:    #e2e8f0;
      --danger:    #ef4444;
      --success:   #10b981;
      --radius:    16px;
      --shadow:    0 4px 20px rgba(0,0,0,.05);
      --transition: .25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ===================== TELA DE ACESSO ===================== */
    #auth-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      padding: 1.5rem;
    }

    .auth-card {
      background: var(--card);
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
      width: 100%;
      max-width: 400px;
      padding: 3rem 2rem;
      text-align: center;
    }

    .auth-logo {
      margin-bottom: 2rem;
    }

    .auth-logo .logo-icon {
      font-size: 3.5rem;
      display: block;
      margin-bottom: 0.5rem;
    }

    .auth-logo h1 {
      font-size: 2.2rem;
      font-weight: 900;
      color: var(--text);
      letter-spacing: -1.5px;
      background: linear-gradient(to right, var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .auth-logo p {
      color: var(--muted);
      font-size: 1rem;
      margin-top: 0.5rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
      text-align: left;
    }

    .form-group label {
      display: block;
      font-size: 0.875rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.5rem;
    }

    .form-group input {
      width: 100%;
      padding: 1rem 1.25rem;
      border: 2px solid var(--border);
      border-radius: 12px;
      font-size: 1rem;
      color: var(--text);
      background: #fff;
      transition: var(--transition);
      outline: none;
    }

    .form-group input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(236, 72, 153, 0.1);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 1rem 1.5rem;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      transition: var(--transition);
    }

    .btn-primary {
      background: linear-gradient(to right, var(--primary), var(--accent));
      color: #fff;
      width: 100%;
      box-shadow: 0 10px 15px -3px rgba(236, 72, 153, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 20px 25px -5px rgba(236, 72, 153, 0.4);
    }

    .auth-error {
      color: var(--danger);
      font-size: 0.875rem;
      margin-top: 0.75rem;
      font-weight: 600;
      min-height: 1.2em;
    }

    /* ===================== APP PRINCIPAL ===================== */
    #app { display: none; }

    /* --- Navbar --- */
    .navbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .nav-inner {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-brand {
      font-size: 1.5rem;
      font-weight: 900;
      letter-spacing: -1.5px;
      background: linear-gradient(to right, var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      cursor: pointer;
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .nav-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      cursor: pointer;
      border: 2px solid var(--primary);
      transition: var(--transition);
    }

    .nav-avatar:hover { transform: scale(1.1); }

    .nav-btn-logout {
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 0.5rem 1rem;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 700;
      cursor: pointer;
      color: var(--muted);
    }

    .nav-btn-logout:hover {
      background: var(--danger);
      color: #fff;
      border-color: var(--danger);
    }

    /* --- Layout --- */
    .layout {
      max-width: 600px; /* Layout centralizado estilo Instagram/X */
      margin: 2rem auto;
      padding: 0 1rem;
    }

    /* --- Criar post --- */
    .create-post {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.5rem;
      margin-bottom: 2rem;
    }

    .create-post-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .create-post-header img {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;
    }

    .create-post-input {
      flex: 1;
      border: none;
      background: var(--bg);
      border-radius: 12px;
      padding: 1rem;
      font-size: 1rem;
      font-family: inherit;
      resize: none;
      outline: none;
      min-height: 60px;
      transition: var(--transition);
    }

    .create-post-input:focus {
      background: #fff;
      box-shadow: inset 0 0 0 2px var(--primary);
    }

    .create-post-footer {
      display: flex;
      justify-content: flex-end;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }

    /* --- Post Card --- */
    .post-card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 1.5rem;
      overflow: hidden;
      animation: slideUp 0.4s ease-out;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .post-header {
      padding: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .post-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      object-fit: cover;
    }

    .post-info { flex: 1; }
    .post-author { font-weight: 800; font-size: 1rem; }
    .post-time { font-size: 0.8rem; color: var(--muted); }

    .post-content {
      padding: 0 1.25rem 1.25rem;
      font-size: 1.05rem;
      line-height: 1.6;
    }

    .post-actions {
      padding: 0.75rem 1.25rem;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 1.5rem;
    }

    .action-btn {
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--muted);
      transition: var(--transition);
    }

    .action-btn:hover { color: var(--primary); }
    .action-btn.liked { color: var(--primary); }

    /* --- Toast --- */
    #toast-container {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      z-index: 1000;
    }

    .toast {
      background: var(--text);
      color: #fff;
      padding: 1rem 1.5rem;
      border-radius: 12px;
      font-weight: 600;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      margin-top: 0.5rem;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  </style>
</head>
<body>

<!-- TELA DE ACESSO -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="logo-icon">✨</span>
      <h1>PhotoFlow</h1>
      <p>A rede social onde o texto flui</p>
    </div>
    <form onsubmit="handleAccess(event)">
      <div class="form-group">
        <label>Seu nome de usuário</label>
        <input type="text" id="username-input" placeholder="Como quer ser chamado?" required maxlength="20" />
      </div>
      <p class="auth-error" id="auth-error"></p>
      <button class="btn btn-primary" type="submit">Entrar no Fluxo 🚀</button>
    </form>
  </div>
</div>

<!-- APP PRINCIPAL -->
<div id="app">
  <nav class="navbar">
    <div class="nav-inner">
      <div class="nav-brand" onclick="window.scrollTo({top:0, behavior:'smooth'})">PhotoFlow</div>
      <div class="nav-actions">
        <img class="nav-avatar" id="nav-avatar" src="" alt="Perfil" />
        <button class="nav-btn-logout" onclick="logout()">Sair</button>
      </div>
    </div>
  </nav>

  <div class="layout">
    <!-- Criar Post -->
    <div class="create-post">
      <div class="create-post-header">
        <img id="user-avatar-post" src="" alt="" />
        <textarea id="post-input" class="create-post-input" placeholder="O que está acontecendo?"></textarea>
      </div>
      <div class="create-post-footer">
        <button class="btn btn-primary" style="width:auto; padding: 0.6rem 1.5rem;" onclick="publishPost()">Publicar</button>
      </div>
    </div>

    <!-- Lista de Posts -->
    <div id="posts-list"></div>
  </div>
</div>

<div id="toast-container"></div>

<script>
/* ============================================================
   ESTADO & DADOS
   ============================================================ */
const AVATARS = [
  'https://i.pravatar.cc/150?img=32',
  'https://i.pravatar.cc/150?img=44',
  'https://i.pravatar.cc/150?img=47',
  'https://i.pravatar.cc/150?img=53',
  'https://i.pravatar.cc/150?img=60',
];

const INITIAL_POSTS = [
  { id: 1, author: 'Alice', username: 'alice_flow', avatar: AVATARS[0], content: 'Bem-vindos ao PhotoFlow! Aqui o foco é a conversa. ✨', likes: 12, liked: false, time: '2h' },
  { id: 2, author: 'Bruno', username: 'bruno_tech', avatar: AVATARS[1], content: 'Incrível como um layout limpo faz diferença na leitura. 📖', likes: 8, liked: false, time: '5h' },
  { id: 3, author: 'Clara', username: 'clara_sun', avatar: AVATARS[2], content: 'Alguém mais animado para o fim de semana? ☀️', likes: 24, liked: false, time: '8h' }
];

let currentUser = null;
let posts = [];

/* ============================================================
   ACESSO
   ============================================================ */
function handleAccess(e) {
  e.preventDefault();
  const input = document.getElementById('username-input');
  const username = input.value.trim();
  const errorEl = document.getElementById('auth-error');

  if (username.length < 3) {
    errorEl.textContent = 'O nome deve ter pelo menos 3 caracteres.';
    return;
  }

  currentUser = {
    name: username,
    username: username.toLowerCase().replace(/\s+/g, '_'),
    avatar: AVATARS[Math.floor(Math.random() * AVATARS.length)]
  };

  initApp();
}

function logout() {
  currentUser = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('username-input').value = '';
}

/* ============================================================
   CORE APP
   ============================================================ */
function initApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';

  document.getElementById('nav-avatar').src = currentUser.avatar;
  document.getElementById('user-avatar-post').src = currentUser.avatar;

  // Carregar posts
  const saved = localStorage.getItem('photoflow_posts');
  posts = saved ? JSON.parse(saved) : INITIAL_POSTS;

  renderPosts();
  showToast(`Bem-vindo, ${currentUser.name}! 👋`);
}

function renderPosts() {
  const container = document.getElementById('posts-list');
  container.innerHTML = '';

  posts.forEach(post => {
    const card = document.createElement('div');
    card.className = 'post-card';
    card.innerHTML = `
      <div class="post-header">
        <img class="post-avatar" src="${post.avatar || 'https://i.pravatar.cc/150?u='+post.username}" alt="" />
        <div class="post-info">
          <div class="post-author">${post.author}</div>
          <div class="post-time">@${post.username} • ${post.time}</div>
        </div>
      </div>
      <div class="post-content">${escHtml(post.content)}</div>
      <div class="post-actions">
        <button class="action-btn ${post.liked ? 'liked' : ''}" onclick="toggleLike(${post.id})">
          ${post.liked ? '❤️' : '🤍'} ${post.likes}
        </button>
        <button class="action-btn" onclick="showToast('Comentários em breve!')">
          💬 Comentar
        </button>
      </div>
    `;
    container.appendChild(card);
  });
}

function publishPost() {
  const input = document.getElementById('post-input');
  const content = input.value.trim();

  if (!content) {
    showToast('Escreva algo para publicar!');
    return;
  }

  const newPost = {
    id: Date.now(),
    author: currentUser.name,
    username: currentUser.username,
    avatar: currentUser.avatar,
    content: content,
    likes: 0,
    liked: false,
    time: 'agora'
  };

  posts.unshift(newPost);
  saveData();
  renderPosts();

  input.value = '';
  showToast('Publicado com sucesso! ✨');
}

function toggleLike(id) {
  const post = posts.find(p => p.id === id);
  if (post) {
    post.liked = !post.liked;
    post.likes += post.liked ? 1 : -1;
    saveData();
    renderPosts();
  }
}

/* ============================================================
   UTILITÁRIOS
   ============================================================ */
function saveData() {
  localStorage.setItem('photoflow_posts', JSON.stringify(posts));
}

function showToast(msg) {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = msg;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

function escHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
</script>

</body>
</html>
