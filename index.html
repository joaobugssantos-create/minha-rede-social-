<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SocialFlow &mdash; Dark Mode</title>
  <style>
    /* ===================== RESET & VARIÁVEIS ===================== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:   #1e3a8a; /* Azul escuro profundo */
      --primary-h: #1e40af;
      --bg:        #000000; /* Preto predominante */
      --card:      #111827; /* Cinza muito escuro para contraste */
      --text:      #ffffff; /* Branco */
      --muted:     #94a3b8;
      --border:    #1f2937;
      --danger:    #ef4444;
      --success:   #10b981;
      --radius:    14px;
      --shadow:    0 4px 12px rgba(0,0,0,0.5);
      --transition: .2s ease;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    /* ===================== TELA DE ACESSO ===================== */
    #auth-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: var(--bg);
    }

    .auth-card {
      background: var(--card);
      border-radius: 24px;
      padding: 3rem 2rem;
      width: 100%;
      max-width: 380px;
      text-align: center;
      border: 1px solid var(--border);
      box-shadow: 0 0 40px rgba(30, 58, 138, 0.2);
    }

    .auth-logo h1 {
      font-size: 2.2rem;
      font-weight: 900;
      margin-bottom: 0.5rem;
      color: var(--text);
      letter-spacing: -1.5px;
    }

    .auth-logo span { color: var(--primary); }

    .form-group { margin-bottom: 1.5rem; text-align: left; }
    .form-group label { display: block; font-size: 0.75rem; font-weight: 700; margin-bottom: 0.5rem; color: var(--muted); text-transform: uppercase; }
    .form-group input { width: 100%; padding: 0.9rem 1.2rem; border: 1px solid var(--border); border-radius: 12px; font-size: 1rem; outline: none; background: #000; color: #fff; transition: var(--transition); }
    .form-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(30, 58, 138, 0.3); }

    .btn { cursor: pointer; border: none; font-weight: 700; transition: var(--transition); }
    .btn-primary { background: var(--primary); color: #fff; padding: 0.9rem 1.5rem; border-radius: 12px; width: 100%; }
    .btn-primary:hover { background: var(--primary-h); transform: translateY(-1px); }

    /* ===================== APP PRINCIPAL ===================== */
    #app { display: none; height: 100vh; flex-direction: column; }

    /* Navbar */
    .navbar {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 10;
    }

    .nav-brand { font-size: 1.6rem; font-weight: 900; color: #fff; letter-spacing: -1.5px; }
    .nav-brand span { color: var(--primary); }

    /* Layout principal */
    .main-layout {
      display: grid;
      grid-template-columns: 280px 1fr 300px;
      gap: 1.5rem;
      max-width: 1400px;
      margin: 0 auto;
      padding: 1rem 1.5rem;
      height: calc(100vh - 60px);
      width: 100%;
    }

    .col { height: 100%; overflow-y: auto; padding-bottom: 2rem; scrollbar-width: none; }
    .col::-webkit-scrollbar { display: none; }

    /* Cards Gerais */
    .card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); padding: 1.5rem; margin-bottom: 1.5rem; }

    /* --- Stories --- */
    .stories-container {
      display: flex;
      gap: 0.8rem;
      padding: 0.5rem 0 1.2rem;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .stories-container::-webkit-scrollbar { display: none; }

    .story-item {
      flex-shrink: 0;
      width: 70px;
      text-align: center;
      cursor: pointer;
    }
    .story-circle {
      width: 66px;
      height: 66px;
      border-radius: 50%;
      background: linear-gradient(45deg, var(--primary), #3b82f6);
      padding: 3px;
      margin-bottom: 0.4rem;
      transition: var(--transition);
    }
    .story-circle:hover { transform: scale(1.05); }
    .story-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid var(--card);
      overflow: hidden;
    }
    .story-inner img { width: 100%; height: 100%; object-fit: cover; }
    .story-name { font-size: 0.7rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* Modal de Visualizar Story */
    #story-viewer {
      display: none;
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 200;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .story-content-box {
      width: 90%;
      max-width: 360px;
      height: 80vh;
      background: var(--primary);
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      position: relative;
    }
    .story-text-display { font-size: 1.8rem; font-weight: 800; color: #fff; line-height: 1.3; }
    .story-progress { position: absolute; top: 15px; left: 15px; right: 15px; height: 3px; background: rgba(255,255,255,0.3); border-radius: 5px; overflow: hidden; }
    .story-bar { height: 100%; background: #fff; width: 0%; }

    /* Modal de Postar Story */
    #story-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 150; align-items: center; justify-content: center; }
    .story-post-card { background: var(--card); padding: 2rem; border-radius: 20px; width: 90%; max-width: 400px; border: 1px solid var(--border); }

    /* --- Perfil --- */
    .profile-avatar { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid var(--primary); margin-bottom: 1rem; }
    .profile-name-display { font-size: 1.2rem; font-weight: 800; }
    .profile-username { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.2rem; }
    .edit-profile-btn { background: #000; color: #fff; border: 1px solid var(--border); padding: 0.6rem; border-radius: 10px; width: 100%; margin-bottom: 1rem; }
    .edit-profile-btn:hover { border-color: var(--primary); }

    /* --- Feed --- */
    .post-textarea { width: 100%; background: #000; border: 1px solid var(--border); border-radius: 12px; padding: 1rem; color: #fff; font-family: inherit; resize: none; min-height: 90px; outline: none; margin-bottom: 0.8rem; }
    .post-textarea:focus { border-color: var(--primary); }

    .post-card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); padding: 1.25rem; margin-bottom: 1rem; }
    .post-author { font-weight: 700; color: #fff; }
    .post-meta { color: var(--muted); font-size: 0.8rem; }
    .post-text { color: #e2e8f0; margin-top: 0.8rem; line-height: 1.5; }
    .post-btn { background: none; color: var(--muted); font-weight: 600; display: flex; align-items: center; gap: 0.4rem; font-size: 0.85rem; }
    .post-btn:hover { color: #fff; }
    .post-btn.liked { color: var(--danger); }

    /* --- Chat --- */
    .chat-card { background: var(--card); border: 1px solid var(--border); height: 100%; border-radius: var(--radius); display: flex; flex-direction: column; overflow: hidden; }
    .chat-header { padding: 1.2rem; border-bottom: 1px solid var(--border); font-weight: 800; display: flex; align-items: center; gap: 0.6rem; }
    .chat-item { padding: 0.8rem 1.2rem; display: flex; align-items: center; gap: 0.8rem; cursor: pointer; transition: var(--transition); }
    .chat-item:hover { background: rgba(30, 58, 138, 0.1); }
    .chat-item.active { background: rgba(30, 58, 138, 0.2); border-left: 4px solid var(--primary); }
    .chat-item img { width: 44px; height: 44px; border-radius: 50%; }

    .chat-window { display: none; flex-direction: column; height: 100%; }
    .chat-window.active { display: flex; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 1rem; background: #000; display: flex; flex-direction: column; gap: 0.8rem; }
    .msg { max-width: 80%; padding: 0.8rem 1rem; border-radius: 16px; font-size: 0.9rem; line-height: 1.4; }
    .msg-received { background: var(--card); color: #fff; align-self: flex-start; border-bottom-left-radius: 2px; }
    .msg-sent { background: var(--primary); color: #fff; align-self: flex-end; border-bottom-right-radius: 2px; }

    .chat-input-area { padding: 1rem; border-top: 1px solid var(--border); display: flex; gap: 0.6rem; }
    .chat-input { flex: 1; background: #000; border: 1px solid var(--border); padding: 0.7rem 1.2rem; border-radius: 999px; color: #fff; outline: none; }
    .chat-send { background: var(--primary); color: #fff; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

    /* Toast */
    #toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: var(--primary); color: #fff; padding: 0.8rem 1.5rem; border-radius: 999px; font-weight: 600; z-index: 1000; display: none; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }

    /* Modal de Edição de Perfil */
    #edit-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 150; align-items: center; justify-content: center; }
    .modal-content { background: var(--card); padding: 2rem; border-radius: 20px; width: 90%; max-width: 400px; border: 1px solid var(--border); }

    @media (max-width: 1000px) {
      .main-layout { grid-template-columns: 1fr; }
      .col-left, .col-right { display: none; }
    }
  </style>
</head>
<body>

<!-- TELA DE ACESSO -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <h1>Social<span>Flow</span></h1>
      <p style="color:var(--muted); margin-bottom: 2.5rem; font-size: 0.9rem;">O fluxo social no modo escuro</p>
    </div>
    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Seu apelido</label>
        <input type="text" id="login-username" placeholder="ex: dark_flow" required />
      </div>
      <button class="btn btn-primary" type="submit">Acessar o Fluxo</button>
    </form>
  </div>
</div>

<!-- APP PRINCIPAL -->
<div id="app">
  <nav class="navbar">
    <div class="nav-brand">Social<span>Flow</span></div>
    <div style="display:flex; align-items:center; gap: 1.2rem;">
      <span id="nav-user-name" style="font-weight:700; font-size: 0.9rem; color: var(--muted);"></span>
      <button onclick="logout()" style="background:none; border:none; color:var(--danger); cursor:pointer; font-weight:800; font-size: 0.8rem; text-transform: uppercase;">Sair</button>
    </div>
  </nav>

  <div class="main-layout">
    <!-- COLUNA ESQUERDA: PERFIL -->
    <aside class="col col-left">
      <div class="card" style="text-align: center;">
        <img id="my-avatar" class="profile-avatar" src="" alt="">
        <div id="my-name-display" class="profile-name-display"></div>
        <div id="my-username-display" class="profile-username"></div>
        <button class="btn edit-profile-btn" onclick="openEditModal()">✏️ Editar Nome</button>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 1rem; border-top: 1px solid var(--border); padding-top: 1.2rem; margin-top: 0.5rem;">
          <div><div style="font-weight:800; color:var(--primary);">842</div><div style="font-size:0.65rem; color:var(--muted); text-transform:uppercase;">Seguidores</div></div>
          <div><div style="font-weight:800; color:var(--primary);">321</div><div style="font-size:0.65rem; color:var(--muted); text-transform:uppercase;">Seguindo</div></div>
        </div>
      </div>

      <div class="card">
        <p style="font-size:0.75rem; font-weight:800; color:var(--muted); text-transform:uppercase; margin-bottom:1rem;">Quem seguir</p>
        <div id="suggestions-list"></div>
      </div>
    </aside>

    <!-- COLUNA CENTRAL: FEED -->
    <main class="col col-center">
      <!-- Stories Bar -->
      <div class="stories-container" id="stories-bar"></div>

      <!-- Criar Post -->
      <div class="card" style="padding: 1.2rem;">
        <textarea id="post-input" class="post-textarea" placeholder="O que está acontecendo no escuro?"></textarea>
        <div style="display:flex; justify-content: flex-end; gap: 0.8rem;">
          <button class="btn" style="background:var(--border); color:#fff; padding: 0.6rem 1.2rem; border-radius:10px; font-size:0.85rem;" onclick="openStoryModal()">✨ Novo Story</button>
          <button class="btn btn-primary" style="width:auto; padding: 0.6rem 2rem;" onclick="publishPost()">Publicar</button>
        </div>
      </div>

      <div id="feed-list"></div>
    </main>

    <!-- COLUNA DIREITA: MENSAGENS -->
    <aside class="col col-right">
      <div class="chat-card">
        <div id="chat-list-view" style="display:flex; flex-direction:column; height: 100%;">
          <div class="chat-header">💬 Mensagens</div>
          <div class="chat-list" id="chat-list" style="flex:1; overflow-y:auto;"></div>
        </div>

        <div id="chat-window-view" class="chat-window">
          <div class="chat-header">
            <button onclick="backToChatList()" style="background:none; border:none; color:#fff; cursor:pointer; font-size:1.2rem;">←</button>
            <img id="chat-target-avatar" src="" style="width:34px; height:34px; border-radius:50%;">
            <span id="chat-target-name" style="font-size:0.95rem;"></span>
          </div>
          <div class="chat-messages" id="chat-messages"></div>
          <div class="chat-input-area">
            <input type="text" id="chat-input" class="chat-input" placeholder="Mensagem..." onkeydown="if(event.key==='Enter') sendMessage()">
            <button class="btn chat-send" onclick="sendMessage()">➤</button>
          </div>
        </div>
      </div>
    </aside>
  </div>
</div>

<!-- MODAL EDITAR PERFIL -->
<div id="edit-modal">
  <div class="modal-content">
    <h3 style="margin-bottom:1.5rem;">Alterar Nome</h3>
    <div class="form-group">
      <label>Nome de Exibição</label>
      <input type="text" id="new-name-input" />
    </div>
    <div style="display:flex; gap:1rem;">
      <button class="btn" style="flex:1; background:var(--bg); border:1px solid var(--border); color:#fff;" onclick="closeEditModal()">Cancelar</button>
      <button class="btn btn-primary" style="flex:1;" onclick="saveNewName()">Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL POSTAR STORY -->
<div id="story-modal">
  <div class="story-post-card">
    <h3 style="margin-bottom:1.5rem;">Criar Story ✨</h3>
    <div class="form-group">
      <label>Texto do Story (Max 60 caracteres)</label>
      <input type="text" id="story-text-input" placeholder="O que você está sentindo? 🔥" maxlength="60" />
    </div>
    <div style="display:flex; gap:1rem;">
      <button class="btn" style="flex:1; background:var(--bg); border:1px solid var(--border); color:#fff;" onclick="closeStoryModal()">Fechar</button>
      <button class="btn btn-primary" style="flex:1;" onclick="publishStory()">Postar Story</button>
    </div>
  </div>
</div>

<!-- VIEWER DE STORY -->
<div id="story-viewer" onclick="closeStoryViewer()">
  <div class="story-progress"><div class="story-bar" id="story-bar-anim"></div></div>
  <div class="story-content-box" id="story-box-content">
    <p class="story-text-display" id="story-text-view"></p>
    <div style="position:absolute; bottom:30px; display:flex; align-items:center; gap:0.8rem;">
      <img id="story-viewer-avatar" src="" style="width:40px; height:40px; border-radius:50%; border:2px solid #fff;">
      <span id="story-viewer-name" style="font-weight:800;"></span>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ============================================================
   ESTADO & DADOS
   ============================================================ */
const AVATARS = [
  'https://i.pravatar.cc/150?img=1', 'https://i.pravatar.cc/150?img=2',
  'https://i.pravatar.cc/150?img=3', 'https://i.pravatar.cc/150?img=4',
  'https://i.pravatar.cc/150?img=5', 'https://i.pravatar.cc/150?img=6'
];

const INITIAL_USERS = [
  { id: 'u1', name: 'Lucas Dark', username: 'lucas_night', avatar: AVATARS[0] },
  { id: 'u2', name: 'Elena Blue', username: 'elena_b', avatar: AVATARS[1] },
  { id: 'u3', name: 'Vitor Storm', username: 'vitor_s', avatar: AVATARS[2] },
  { id: 'u4', name: 'Sofia White', username: 'sofia_w', avatar: AVATARS[3] }
];

let currentUser = null;
let posts = [];
let stories = [];
let chats = {};
let activeChatUserId = null;
let storyTimer = null;

/* ============================================================
   ACESSO
   ============================================================ */
function handleLogin(e) {
  e.preventDefault();
  const username = document.getElementById('login-username').value.trim();
  if (username.length < 2) return;

  currentUser = {
    id: 'me',
    name: username.charAt(0).toUpperCase() + username.slice(1),
    username: '@' + username.toLowerCase().replace(/\s+/g, '_'),
    avatar: AVATARS[Math.floor(Math.random() * AVATARS.length)]
  };

  initApp();
}

function logout() {
  currentUser = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'flex';
}

/* ============================================================
   CORE APP
   ============================================================ */
function initApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';

  updateProfileUI();
  loadData();
  renderStories();
  renderFeed();
  renderChatList();
  renderSuggestions();

  showToast(`SocialFlow: Modo Escuro Ativado 🌙`);
}

function updateProfileUI() {
  document.getElementById('nav-user-name').textContent = currentUser.name;
  document.getElementById('my-avatar').src = currentUser.avatar;
  document.getElementById('my-name-display').textContent = currentUser.name;
  document.getElementById('my-username-display').textContent = currentUser.username;
  document.getElementById('new-name-input').value = currentUser.name;
}

function openEditModal() { document.getElementById('edit-modal').style.display = 'flex'; }
function closeEditModal() { document.getElementById('edit-modal').style.display = 'none'; }

function saveNewName() {
  const newName = document.getElementById('new-name-input').value.trim();
  if (newName.length < 2) return;
  currentUser.name = newName;
  updateProfileUI();
  closeEditModal();
  showToast('Nome alterado! ✅');
  posts.forEach(p => { if (p.userId === 'me') p.author = newName; });
  saveData();
  renderFeed();
}

/* ============================================================
   STORIES
   ============================================================ */
function openStoryModal() { document.getElementById('story-modal').style.display = 'flex'; }
function closeStoryModal() { document.getElementById('story-modal').style.display = 'none'; }

function publishStory() {
  const input = document.getElementById('story-text-input');
  const text = input.value.trim();
  if (!text) return;

  const newStory = {
    id: Date.now(),
    userId: 'me',
    author: currentUser.name,
    avatar: currentUser.avatar,
    text: text
  };

  stories.unshift(newStory);
  input.value = '';
  closeStoryModal();
  saveData();
  renderStories();
  showToast('Story publicado! ✨');
}

function renderStories() {
  const container = document.getElementById('stories-bar');
  container.innerHTML = '';

  // Story de exemplo se estiver vazio
  if (stories.length === 0) {
    stories = [
      { id: 1, userId: 'u1', author: 'Lucas', avatar: AVATARS[0], text: 'Noite produtiva por aqui! 💻🔥' },
      { id: 2, userId: 'u2', author: 'Elena', avatar: AVATARS[1], text: 'SocialFlow está incrível! 🚀' }
    ];
  }

  stories.forEach(s => {
    const item = document.createElement('div');
    item.className = 'story-item';
    item.onclick = () => viewStory(s);
    item.innerHTML = `
      <div class="story-circle">
        <div class="story-inner"><img src="${s.avatar}"></div>
      </div>
      <div class="story-name">${s.author}</div>
    `;
    container.appendChild(item);
  });
}

function viewStory(story) {
  const viewer = document.getElementById('story-viewer');
  const bar = document.getElementById('story-bar-anim');
  const text = document.getElementById('story-text-view');
  const avatar = document.getElementById('story-viewer-avatar');
  const name = document.getElementById('story-viewer-name');

  viewer.style.display = 'flex';
  text.textContent = story.text;
  avatar.src = story.avatar;
  name.textContent = story.author;

  bar.style.width = '0%';
  let progress = 0;
  clearInterval(storyTimer);
  storyTimer = setInterval(() => {
    progress += 2;
    bar.style.width = progress + '%';
    if (progress >= 100) {
      closeStoryViewer();
    }
  }, 60);
}

function closeStoryViewer() {
  document.getElementById('story-viewer').style.display = 'none';
  clearInterval(storyTimer);
}

/* ============================================================
   FEED & POSTS
   ============================================================ */
function publishPost() {
  const input = document.getElementById('post-input');
  const text = input.value.trim();
  if (!text) return;

  const newPost = {
    id: Date.now(),
    userId: 'me',
    author: currentUser.name,
    username: currentUser.username,
    avatar: currentUser.avatar,
    content: text,
    likes: 0,
    liked: false,
    time: 'agora'
  };

  posts.unshift(newPost);
  input.value = '';
  saveData();
  renderFeed();
  showToast('Publicado no feed! 🚀');
}

function renderFeed() {
  const container = document.getElementById('feed-list');
  container.innerHTML = '';

  if (posts.length === 0) {
    posts = [
      { id: 101, userId: 'u1', author: 'Lucas Dark', username: '@lucas_night', avatar: AVATARS[0], content: 'O preto e azul combinam perfeitamente com esse site. 🌑💙', likes: 42, liked: false, time: '2h' },
      { id: 102, userId: 'u2', author: 'Elena Blue', username: '@elena_b', avatar: AVATARS[1], content: 'Alguém já testou o sistema de stories? Ficou muito rápido!', likes: 15, liked: false, time: '5h' }
    ];
  }

  posts.forEach(post => {
    const card = document.createElement('div');
    card.className = 'post-card';
    card.innerHTML = `
      <div style="display:flex; align-items:center; gap:0.8rem; margin-bottom:1rem;">
        <img src="${post.avatar}" style="width:40px; height:40px; border-radius:50%;">
        <div>
          <div class="post-author">${post.author}</div>
          <div class="post-meta">${post.username} • ${post.time}</div>
        </div>
      </div>
      <div class="post-text">${escHtml(post.content)}</div>
      <div style="display:flex; gap:1.5rem; margin-top:1.2rem; border-top:1px solid var(--border); padding-top:0.8rem;">
        <button class="btn post-btn ${post.liked ? 'liked' : ''}" onclick="toggleLike(${post.id})">
          ${post.liked ? '❤️' : '🤍'} ${post.likes}
        </button>
        <button class="btn post-btn" onclick="openChat('${post.userId}')">💬 Chat</button>
      </div>
    `;
    container.appendChild(card);
  });
}

function toggleLike(id) {
  const post = posts.find(p => p.id === id);
  if (post) {
    post.liked = !post.liked;
    post.likes += post.liked ? 1 : -1;
    saveData();
    renderFeed();
  }
}

/* ============================================================
   CHAT
   ============================================================ */
function renderChatList() {
  const container = document.getElementById('chat-list');
  container.innerHTML = '';
  INITIAL_USERS.forEach(user => {
    const item = document.createElement('div');
    item.className = `chat-item ${activeChatUserId === user.id ? 'active' : ''}`;
    item.onclick = () => openChat(user.id);
    item.innerHTML = `
      <img src="${user.avatar}">
      <div style="flex:1;">
        <div style="font-weight:700; font-size:0.9rem;">${user.name}</div>
        <div style="font-size:0.75rem; color:var(--muted);">@${user.username}</div>
      </div>
    `;
    container.appendChild(item);
  });
}

function openChat(userId) {
  if (userId === 'me') return;
  activeChatUserId = userId;
  const user = INITIAL_USERS.find(u => u.id === userId);
  document.getElementById('chat-list-view').style.display = 'none';
  document.getElementById('chat-window-view').classList.add('active');
  document.getElementById('chat-target-avatar').src = user.avatar;
  document.getElementById('chat-target-name').textContent = user.name;
  renderMessages();
  renderChatList();
}

function backToChatList() {
  activeChatUserId = null;
  document.getElementById('chat-list-view').style.display = 'flex';
  document.getElementById('chat-window-view').classList.remove('active');
}

function renderMessages() {
  const container = document.getElementById('chat-messages');
  container.innerHTML = '';
  const messages = chats[activeChatUserId] || [];
  messages.forEach(m => {
    const el = document.createElement('div');
    el.className = `msg ${m.sender === 'me' ? 'msg-sent' : 'msg-received'}`;
    el.textContent = m.text;
    container.appendChild(el);
  });
  container.scrollTop = container.scrollHeight;
}

function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text || !activeChatUserId) return;
  if (!chats[activeChatUserId]) chats[activeChatUserId] = [];
  chats[activeChatUserId].push({ sender: 'me', text: text });
  input.value = '';
  renderMessages();
  setTimeout(() => {
    chats[activeChatUserId].push({ sender: 'other', text: 'Entendido! 🌙' });
    if (activeChatUserId) renderMessages();
    saveData();
  }, 800);
  saveData();
}

/* ============================================================
   UTILITÁRIOS
   ============================================================ */
function renderSuggestions() {
  const container = document.getElementById('suggestions-list');
  container.innerHTML = '';
  INITIAL_USERS.forEach(user => {
    const item = document.createElement('div');
    item.style = 'display:flex; align-items:center; gap:0.8rem; margin-bottom:1rem;';
    item.innerHTML = `
      <img src="${user.avatar}" style="width:34px; height:34px; border-radius:50%;">
      <div style="flex:1;">
        <div style="font-size:0.85rem; font-weight:700;">${user.name}</div>
        <div style="font-size:0.7rem; color:var(--muted);">@${user.username}</div>
      </div>
      <button class="btn" style="font-size:0.7rem; padding:0.3rem 0.6rem; background:var(--bg); border:1px solid var(--border); color:#fff;" onclick="showToast('Seguindo!')">Seguir</button>
    `;
    container.appendChild(item);
  });
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 3000);
}

function escHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function saveData() {
  localStorage.setItem('sf_posts_v4', JSON.stringify(posts));
  localStorage.setItem('sf_stories_v4', JSON.stringify(stories));
  localStorage.setItem('sf_chats_v4', JSON.stringify(chats));
}

function loadData() {
  const p = localStorage.getItem('sf_posts_v4'); if (p) posts = JSON.parse(p);
  const s = localStorage.getItem('sf_stories_v4'); if (s) stories = JSON.parse(s);
  const c = localStorage.getItem('sf_chats_v4'); if (c) chats = JSON.parse(c);
}
</script>
